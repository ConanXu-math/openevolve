# 函数极小值搜索示例配置
max_iterations: 10          # 最大进化迭代次数
checkpoint_interval: 5      # 多少轮保存一次检查点

# LLM 大模型配置
llm:
  primary_model: "qwen2.5:7b"
  # primary_model: "gemini-2.5-flash-lite"
  # primary_model: "gpt-5-mini"
  # primary_model: "llama3.1-8b"
  primary_model_weight: 1.0  # 主模型权重
  secondary_model: "qwen2.5:7b"
  # secondary_model: "gemini-2.5-flash"
  # secondary_model: "llama-4-scout-17b-16e-instruct"
  # secondary_model: "gpt-5-nano"
  secondary_model_weight: 0.0 # 辅模型权重 (设置为0则不使用)
  api_base: "http://localhost:11434/v1"
  # api_base: "https://generativelanguage.googleapis.com/v1beta/openai/"
  # api_base: "https://api.cerebras.ai/v1"
  # api_base: "https://api.openai.com/v1"
  temperature: 0.7            # 采样温度，越高越有创造性
  max_tokens: 16000           # 最大生成 token 数
  timeout: 300                # 请求超时时间(秒)

# 提示词配置
prompt:
  # 系统提示词：告诉 AI 它的角色和任务目标
  system_message: "You are an expert programmer specializing in optimization algorithms. Your task is to improve a function minimization algorithm to find the global minimum of a complex function with many local minima. The function is f(x, y) = sin(x) * cos(y) + sin(x*y) + (x^2 + y^2)/20. Focus on improving the search_algorithm function to reliably find the global minimum, escaping local minima that might trap simple algorithms."

# 数据库/种群配置
database:
  population_size: 50         # 种群大小 (保留多少个优秀的解)
  archive_size: 20            # 存档大小
  num_islands: 3              # 进化岛屿数量 (并行进化的独立种群数)
  elite_selection_ratio: 0.2  # 精英选择比例 (选最好的前 20%)
  exploitation_ratio: 0.7     # 开发比例 (70% 基于现有优秀代码微调，30% 探索新方向)

  # embedding_model: "text-embedding-3-small"
  similarity_threshold: 0.99  # 相似度阈值 (太相似的代码会被视为重复)

# 评估器配置
evaluator:
  timeout: 60                 # 代码运行超时时间(秒)
  cascade_thresholds: [1.3]   # 级联评估阈值 (分数差于 1.3 的直接淘汰，不进行后续测试)
  parallel_evaluations: 3     # 并行评估数量

# 进化设置
diff_based_evolution: false    # 基于 diff 的进化 (只生成修改部分，节省 token)
max_code_length: 20000        # 最大代码长度限制
