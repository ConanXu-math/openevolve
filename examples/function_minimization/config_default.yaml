# OpenEvolve 默认配置
# 结果将保存在输入文件夹下的 openevolve_output 目录中

max_iterations: 10
checkpoint_interval: 5

# LLM 配置
llm:
  primary_model: "deepseek-chat"
  primary_model_weight: 1.0
  secondary_model: "deepseek-chat"
  secondary_model_weight: 0.0
  api_base: "https://api.deepseek.com"
  api_key: "${DEEPSEEK_API_KEY}" # 从环境变量读取
  temperature: 0.7
  max_tokens: 8000
  timeout: 300

# 提示词配置
prompt:
  system_message: "You are an expert programmer specializing in optimization algorithms. Your task is to improve a function minimization algorithm to find the global minimum of a complex function with many local minima."

# 数据库配置
database:
  population_size: 50
  archive_size: 20
  num_islands: 3
  elite_selection_ratio: 0.2
  exploitation_ratio: 0.7
  similarity_threshold: 0.99

# 评估器配置
evaluator:
  timeout: 60
  cascade_thresholds: [1.3]
  parallel_evaluations: 3

# 进化设置
diff_based_evolution: false
max_code_length: 20000
